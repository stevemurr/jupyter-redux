<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupyter Redux</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <h1 class="app-title">Jupyter Redux</h1>
        <button id="new-notebook-btn" class="btn btn-primary" aria-label="Create new notebook">
            + New Notebook
        </button>
    </header>

    <main class="notebook-list-container" role="list" aria-label="Notebooks">
        <div id="notebook-list" class="notebook-list">
            <p class="empty-state" id="empty-state">No notebooks yet. Create one to get started.</p>
        </div>
    </main>

    <!-- New notebook dialog -->
    <div class="dialog-overlay" id="new-notebook-dialog" style="display:none;">
        <div class="dialog">
            <h2 class="dialog-title">New Notebook</h2>
            <label class="dialog-label">
                Name
                <input type="text" id="dialog-name" class="dialog-input" value="Untitled Notebook">
            </label>
            <label class="dialog-label">
                Python Version
                <select id="dialog-python" class="dialog-select">
                    <option value="3.11" selected>Python 3.11</option>
                    <option value="3.12">Python 3.12</option>
                    <option value="3.13">Python 3.13</option>
                    <option value="3.10">Python 3.10</option>
                </select>
            </label>
            <label class="dialog-label dialog-checkbox-label">
                <input type="checkbox" id="dialog-gpu">
                Enable GPU acceleration
            </label>
            <div class="dialog-actions">
                <button class="btn" id="dialog-cancel">Cancel</button>
                <button class="btn btn-primary" id="dialog-create">Create</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=3"></script>
    <script>
        const listEl = document.getElementById('notebook-list');
        const emptyState = document.getElementById('empty-state');
        const newBtn = document.getElementById('new-notebook-btn');

        async function loadNotebooks() {
            const data = await api.get('/api/notebooks');
            listEl.innerHTML = '';
            if (!data || !data.notebooks || data.notebooks.length === 0) {
                const msg = document.createElement('p');
                msg.className = 'empty-state';
                msg.textContent = 'No notebooks yet. Create one to get started.';
                listEl.appendChild(msg);
                return;
            }
            data.notebooks
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .forEach(nb => {
                    const card = document.createElement('div');
                    card.className = 'notebook-card';
                    card.setAttribute('role', 'listitem');
                    const gpuBadge = nb.gpu ? '<span class="card-badge gpu">GPU</span>' : '';
                    card.innerHTML = `
                        <div class="notebook-card-info">
                            <span class="notebook-name" data-id="${nb.id}">${escapeHtml(nb.name)}</span>
                            <div class="notebook-card-badges">
                                <span class="card-badge python">Python ${nb.python_version || '3.11'}</span>
                                ${gpuBadge}
                                <span class="notebook-date">${new Date(nb.updated_at).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="notebook-card-actions">
                            <button class="btn btn-small btn-rename" data-id="${nb.id}" aria-label="Rename notebook">Rename</button>
                            <button class="btn btn-small btn-danger btn-delete" data-id="${nb.id}" aria-label="Delete notebook">Delete</button>
                        </div>
                    `;
                    card.querySelector('.notebook-card-info').addEventListener('click', () => {
                        window.location.href = `/notebook/${nb.id}`;
                    });
                    card.querySelector('.btn-rename').addEventListener('click', (e) => {
                        e.stopPropagation();
                        renameNotebook(nb.id, nb.name);
                    });
                    card.querySelector('.btn-delete').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteNotebook(nb.id, nb.name);
                    });
                    listEl.appendChild(card);
                });
        }

        async function renameNotebook(id, currentName) {
            const newName = prompt('Rename notebook:', currentName);
            if (newName && newName !== currentName) {
                await api.put(`/api/notebooks/${id}`, { name: newName });
                loadNotebooks();
            }
        }

        async function deleteNotebook(id, name) {
            if (!confirm(`Delete "${name}"? This will remove the notebook and its container.`)) return;
            const card = listEl.querySelector(`[data-id="${id}"]`)?.closest('.notebook-card');
            if (card) {
                card.style.opacity = '0.5';
                card.style.pointerEvents = 'none';
                const btn = card.querySelector('.btn-delete');
                if (btn) btn.textContent = 'Deleting...';
            }
            await api.del(`/api/notebooks/${id}`);
            loadNotebooks();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const dialog = document.getElementById('new-notebook-dialog');
        const dialogName = document.getElementById('dialog-name');
        const dialogPython = document.getElementById('dialog-python');
        const dialogGpu = document.getElementById('dialog-gpu');
        const dialogCreate = document.getElementById('dialog-create');
        const dialogCancel = document.getElementById('dialog-cancel');

        newBtn.addEventListener('click', () => {
            dialogName.value = 'Untitled Notebook';
            dialogPython.value = '3.11';
            dialogGpu.checked = false;
            dialog.style.display = 'flex';
            dialogName.select();
        });

        dialogCancel.addEventListener('click', () => {
            dialog.style.display = 'none';
        });

        dialog.addEventListener('click', (e) => {
            if (e.target === dialog) dialog.style.display = 'none';
        });

        dialogCreate.addEventListener('click', async () => {
            dialogCreate.disabled = true;
            dialogCreate.textContent = 'Creating...';
            const data = await api.post('/api/notebooks', {
                name: dialogName.value || 'Untitled Notebook',
                python_version: dialogPython.value,
                gpu: dialogGpu.checked,
            });
            dialogCreate.disabled = false;
            dialogCreate.textContent = 'Create';
            dialog.style.display = 'none';
            if (data && data.id) {
                window.location.href = `/notebook/${data.id}`;
            }
        });

        loadNotebooks();
    </script>
</body>
</html>
