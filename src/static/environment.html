<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment - Jupyter Redux</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <a href="/" class="btn btn-small" aria-label="Back to environments">&larr; Back</a>
        <div class="toolbar-separator"></div>
        <input type="text" class="notebook-title" id="env-title"
               aria-label="Environment name" placeholder="Untitled Environment">
        <div class="toolbar-spacer"></div>
        <div class="notebook-card-badges" id="env-badges" style="display:flex;align-items:center;gap:8px;"></div>
        <div class="container-badge none" id="container-badge" aria-live="polite">
            <span class="badge-dot">&#9679;</span> <span class="badge-text">No container</span>
        </div>
    </header>

    <main class="notebook-list-container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="margin:0;color:var(--text-primary);">Notebooks</h2>
            <button id="new-notebook-btn" class="btn btn-primary" aria-label="Create new notebook">
                + New Notebook
            </button>
        </div>
        <div id="notebook-list" class="notebook-list" role="list" aria-label="Notebooks">
            <p class="empty-state" id="empty-state">No notebooks yet. Create one to get started.</p>
        </div>
    </main>

    <!-- New notebook dialog -->
    <div class="dialog-overlay" id="new-notebook-dialog" style="display:none;">
        <div class="dialog">
            <h2 class="dialog-title">New Notebook</h2>
            <label class="dialog-label">
                Name
                <input type="text" id="dialog-name" class="dialog-input" value="Untitled Notebook">
            </label>
            <div class="dialog-actions">
                <button class="btn" id="dialog-cancel">Cancel</button>
                <button class="btn btn-primary" id="dialog-create">Create</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=4"></script>
    <script>
        const envId = window.location.pathname.split('/').filter(Boolean)[1];
        const listEl = document.getElementById('notebook-list');
        const titleInput = document.getElementById('env-title');
        const badgesEl = document.getElementById('env-badges');
        const containerBadge = document.getElementById('container-badge');
        const newBtn = document.getElementById('new-notebook-btn');

        let envData = null;

        async function loadEnvironment() {
            const data = await api.get(`/api/environments/${envId}`);
            if (!data) {
                document.querySelector('main').innerHTML = '<p class="empty-state">Environment not found.</p>';
                return;
            }
            envData = data;
            titleInput.value = data.name;
            document.title = `${data.name} - Jupyter Redux`;

            // Badges
            badgesEl.innerHTML = `
                <span class="card-badge python">Python ${data.python_version || '3.11'}</span>
                ${data.gpu ? '<span class="card-badge gpu">GPU</span>' : ''}
            `;

            // Container state
            if (data.container_state) {
                updateContainerBadge(data.container_state.status);
            }

            renderNotebooks(data.notebooks || []);
        }

        function renderNotebooks(notebooks) {
            listEl.innerHTML = '';
            if (notebooks.length === 0) {
                const msg = document.createElement('p');
                msg.className = 'empty-state';
                msg.textContent = 'No notebooks yet. Create one to get started.';
                listEl.appendChild(msg);
                return;
            }
            notebooks
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .forEach(nb => {
                    const card = document.createElement('div');
                    card.className = 'notebook-card';
                    card.setAttribute('role', 'listitem');
                    card.innerHTML = `
                        <div class="notebook-card-info">
                            <span class="notebook-name" data-id="${nb.id}">${escapeHtml(nb.name)}</span>
                            <div class="notebook-card-badges">
                                <span class="notebook-date">${new Date(nb.updated_at).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="notebook-card-actions">
                            <button class="btn btn-small btn-rename" data-id="${nb.id}" aria-label="Rename notebook">Rename</button>
                            <button class="btn btn-small btn-danger btn-delete" data-id="${nb.id}" aria-label="Delete notebook">Delete</button>
                        </div>
                    `;
                    card.querySelector('.notebook-card-info').addEventListener('click', () => {
                        window.location.href = `/environment/${envId}/notebook/${nb.id}`;
                    });
                    card.querySelector('.btn-rename').addEventListener('click', (e) => {
                        e.stopPropagation();
                        renameNotebook(nb.id, nb.name);
                    });
                    card.querySelector('.btn-delete').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteNotebook(nb.id, nb.name);
                    });
                    listEl.appendChild(card);
                });
        }

        function updateContainerBadge(status, message) {
            const dot = containerBadge.querySelector('.badge-dot');
            const text = containerBadge.querySelector('.badge-text');
            containerBadge.className = `container-badge ${status}`;
            const labels = {
                none: 'No container',
                building: message || 'Building image...',
                starting: 'Starting...',
                ready: 'Running',
                stopping: 'Stopping...',
                stopped: 'Stopped',
                error: message || 'Error',
            };
            text.textContent = labels[status] || status;
        }

        async function renameNotebook(id, currentName) {
            const newName = prompt('Rename notebook:', currentName);
            if (newName && newName !== currentName) {
                await api.put(`/api/notebooks/${id}`, { name: newName });
                loadEnvironment();
            }
        }

        async function deleteNotebook(id, name) {
            if (!confirm(`Delete "${name}"?`)) return;
            const card = listEl.querySelector(`[data-id="${id}"]`)?.closest('.notebook-card');
            if (card) {
                card.style.opacity = '0.5';
                card.style.pointerEvents = 'none';
            }
            await api.del(`/api/notebooks/${id}`);
            loadEnvironment();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Rename environment on title change
        titleInput.addEventListener('change', async () => {
            const newName = titleInput.value.trim();
            if (!newName || !envData || newName === envData.name) return;
            const data = await api.put(`/api/environments/${envId}`, { name: newName });
            if (data) {
                envData.name = newName;
                document.title = `${newName} - Jupyter Redux`;
            } else {
                titleInput.value = envData.name;
            }
        });
        titleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); titleInput.blur(); }
        });

        // New notebook dialog
        const dialog = document.getElementById('new-notebook-dialog');
        const dialogName = document.getElementById('dialog-name');
        const dialogCreate = document.getElementById('dialog-create');
        const dialogCancel = document.getElementById('dialog-cancel');

        newBtn.addEventListener('click', () => {
            dialogName.value = 'Untitled Notebook';
            dialog.style.display = 'flex';
            dialogName.select();
        });

        dialogCancel.addEventListener('click', () => {
            dialog.style.display = 'none';
        });

        dialog.addEventListener('click', (e) => {
            if (e.target === dialog) dialog.style.display = 'none';
        });

        dialogCreate.addEventListener('click', async () => {
            dialogCreate.disabled = true;
            dialogCreate.textContent = 'Creating...';
            const data = await api.post(`/api/environments/${envId}/notebooks`, {
                name: dialogName.value || 'Untitled Notebook',
            });
            dialogCreate.disabled = false;
            dialogCreate.textContent = 'Create';
            dialog.style.display = 'none';
            if (data && data.id) {
                window.location.href = `/environment/${envId}/notebook/${data.id}`;
            }
        });

        loadEnvironment();
    </script>
</body>
</html>
