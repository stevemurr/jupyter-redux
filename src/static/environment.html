<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment - Jupyter Redux</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- CodeMirror 6 for file editor + notebook cells -->
    <script type="module">
        import {
            EditorView, keymap, lineNumbers, highlightActiveLine, highlightActiveLineGutter,
            EditorState, defaultKeymap, python, pythonLanguage,
            syntaxHighlighting, defaultHighlightStyle, oneDark,
            autocompletion, completionKeymap, acceptCompletion
        } from '/static/js/cm-bundle.js';

        window.EditorView = EditorView;
        window.EditorState = EditorState;
        window.keymap = keymap;
        window.defaultKeymap = defaultKeymap;
        window.python = python;
        window.pythonLanguage = pythonLanguage;
        window.lineNumbers = lineNumbers;
        window.highlightActiveLine = highlightActiveLine;
        window.highlightActiveLineGutter = highlightActiveLineGutter;
        window.syntaxHighlighting = syntaxHighlighting;
        window.defaultHighlightStyle = defaultHighlightStyle;
        window.oneDark = oneDark;
        window.autocompletion = autocompletion;
        window.completionKeymap = completionKeymap;
        window.acceptCompletion = acceptCompletion;

        window.dispatchEvent(new Event('codemirror-ready'));
    </script>
</head>
<body>
    <div class="env-layout">
        <!-- Sidebar -->
        <div class="env-sidebar" id="env-sidebar">
            <!-- Top bar: always visible in both states -->
            <div class="sidebar-topbar">
                <a href="/" class="sidebar-back" aria-label="Back to environments" title="Back to environments">&larr;</a>
                <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
                    <span id="toggle-icon">&#9664;</span>
                </button>
            </div>

            <!-- Scrollable middle: hides when collapsed -->
            <div class="sidebar-middle">
                <!-- Environment -->
                <div class="sidebar-header">
                    <h3>Environment</h3>
                </div>
                <div class="sidebar-env-meta">
                    <input type="text" class="env-title-input" id="env-title"
                           aria-label="Environment name" placeholder="Untitled Environment">
                    <div class="notebook-card-badges" id="env-badges"></div>
                </div>

                <!-- Notebooks -->
                <div class="sidebar-header">
                    <h3>Notebooks</h3>
                    <div class="sidebar-actions">
                        <button id="new-notebook-btn" title="New notebook">+ New</button>
                    </div>
                </div>
                <div id="notebook-list" style="padding:4px 0;"></div>

                <!-- Datasets (read-only browse of /shared/datasets) -->
                <div class="sidebar-header shared-header collapsed" data-target="datasets-tree">
                    <span class="section-chevron">&#9654;</span>
                    <h3>Datasets</h3>
                    <div class="sidebar-actions">
                        <button class="btn-refresh-shared" data-root="datasets" title="Refresh">&#8635;</button>
                    </div>
                </div>
                <div class="file-tree shared-tree" id="datasets-tree" style="display:none;">
                    <div class="file-tree-empty">No datasets yet.</div>
                </div>

                <!-- Artifacts (read-only browse of /shared/artifacts) -->
                <div class="sidebar-header shared-header collapsed" data-target="artifacts-tree">
                    <span class="section-chevron">&#9654;</span>
                    <h3>Artifacts</h3>
                    <div class="sidebar-actions">
                        <button class="btn-refresh-shared" data-root="artifacts" title="Refresh">&#8635;</button>
                    </div>
                </div>
                <div class="file-tree shared-tree" id="artifacts-tree" style="display:none;">
                    <div class="file-tree-empty">No artifacts yet.</div>
                </div>

                <!-- Repos -->
                <div class="sidebar-header">
                    <h3>Repos</h3>
                    <div class="sidebar-actions">
                        <button id="btn-clone-repo" title="Clone a repository">+ Clone</button>
                    </div>
                </div>
                <div class="file-tree" id="repo-list">
                    <div class="file-tree-empty" id="repo-list-empty">No repos cloned</div>
                </div>
            </div>

            <!-- Bottom bar: always visible in both states -->
            <div class="sidebar-bottom">
                <div class="resource-monitor" id="resource-monitor">
                    <div class="resource-bar" data-metric="cpu" title="CPU usage">
                        <span class="rb-label">CPU</span>
                        <div class="rb-track"><div class="rb-fill"></div></div>
                        <span class="rb-readout">—</span>
                    </div>
                    <div class="resource-bar" data-metric="mem" title="Memory usage">
                        <span class="rb-label">MEM</span>
                        <div class="rb-track"><div class="rb-fill"></div></div>
                        <span class="rb-readout">—</span>
                    </div>
                    <div class="resource-bar" data-metric="gpu" title="GPU memory usage">
                        <span class="rb-label">GPU</span>
                        <div class="rb-track"><div class="rb-fill"></div></div>
                        <span class="rb-readout">—</span>
                    </div>
                </div>
                <div class="container-badge none" id="container-badge" aria-live="polite">
                    <span class="badge-spinner"></span>
                    <span class="badge-dot">&#9679;</span> <span class="badge-text">No container</span>
                </div>
            </div>
        </div>

        <!-- Main editor area -->
        <div class="env-main">
            <div class="editor-tabs" id="editor-tabs"></div>
            <div class="file-editor-area" id="editor-area">
                <div class="file-editor-placeholder" id="editor-placeholder">
                    Select a file or notebook from the sidebar.
                </div>
            </div>
            <div class="file-editor-status" id="editor-status">
                <span id="status-path"></span>
                <span id="status-save"></span>
            </div>
        </div>
    </div>

    <!-- New notebook dialog -->
    <div class="dialog-overlay" id="new-notebook-dialog" style="display:none;">
        <div class="dialog">
            <h2 class="dialog-title">New Notebook</h2>
            <label class="dialog-label">
                Name
                <input type="text" id="dialog-name" class="dialog-input" value="Untitled Notebook">
            </label>
            <div class="dialog-actions">
                <button class="btn" id="dialog-cancel">Cancel</button>
                <button class="btn btn-primary" id="dialog-create">Create</button>
            </div>
        </div>
    </div>

    <!-- Clone repo dialog -->
    <div class="dialog-overlay" id="clone-dialog" style="display:none;">
        <div class="dialog">
            <h2 class="dialog-title">Clone Repository</h2>
            <label class="dialog-label">
                Repository URL
                <input type="text" id="clone-url" class="dialog-input"
                       placeholder="https://github.com/user/repo.git">
            </label>
            <label class="dialog-label">
                Branch (optional)
                <input type="text" id="clone-branch" class="dialog-input"
                       placeholder="main">
            </label>
            <div id="clone-status" style="display:none;font-size:0.85rem;margin-bottom:12px;"></div>
            <div class="dialog-actions">
                <button class="btn" id="clone-cancel">Cancel</button>
                <button class="btn btn-primary" id="clone-submit">Clone</button>
            </div>
        </div>
    </div>

    <!-- Install prompt dialog -->
    <div class="dialog-overlay" id="install-dialog" style="display:none;">
        <div class="dialog" style="width:520px;">
            <h2 class="dialog-title">Project Detected</h2>
            <p id="install-message" style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;"></p>
            <div id="install-markers" style="font-family:var(--font-mono);font-size:0.8rem;color:var(--accent-cyan);margin-bottom:16px;"></div>
            <div class="dialog-actions">
                <button class="btn" id="install-skip">Skip</button>
                <button class="btn btn-primary" id="install-run">Install as Editable Package</button>
            </div>
        </div>
    </div>

    <!-- Build log overlay -->
    <div class="build-log-overlay" id="build-log-overlay">
        <div class="build-log" id="build-log">
            <div class="build-log-header">
                <span class="build-log-title">Building container image...</span>
                <button class="build-log-close" id="build-log-close" title="Close">&times;</button>
            </div>
            <pre class="build-log-content" id="build-log-content"></pre>
        </div>
    </div>

    <script src="/static/js/app.js?v=6"></script>
    <script src="/static/js/ws.js?v=6"></script>
    <script>
    (function() {
        const envId = window.location.pathname.split('/').filter(Boolean)[1];
        let envData = null;

        // Unified tab system: key -> { type:'file'|'notebook', ...data }
        const openTabs = new Map();
        let activeTabKey = null;

        const titleInput = document.getElementById('env-title');
        const badgesEl = document.getElementById('env-badges');
        const containerBadge = document.getElementById('container-badge');
        const datasetsTree = document.getElementById('datasets-tree');
        const artifactsTree = document.getElementById('artifacts-tree');
        const tabsBar = document.getElementById('editor-tabs');
        const editorArea = document.getElementById('editor-area');
        const editorPlaceholder = document.getElementById('editor-placeholder');
        const statusPath = document.getElementById('status-path');
        const statusSave = document.getElementById('status-save');
        const notebookList = document.getElementById('notebook-list');
        const repoList = document.getElementById('repo-list');
        const repoListEmpty = document.getElementById('repo-list-empty');
        const sidebar = document.getElementById('env-sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const _installingRepos = new Set();

        // --- Sidebar collapse ---
        function setSidebarCollapsed(collapsed) {
            sidebar.classList.toggle('collapsed', collapsed);
            toggleIcon.innerHTML = collapsed ? '&#9654;' : '&#9664;';
            toggleBtn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
            localStorage.setItem('jredux-sidebar-collapsed', collapsed ? '1' : '');
        }
        toggleBtn.addEventListener('click', () => {
            setSidebarCollapsed(!sidebar.classList.contains('collapsed'));
        });
        if (localStorage.getItem('jredux-sidebar-collapsed') === '1') {
            setSidebarCollapsed(true);
        }

        // =====================================================================
        //  LOAD ENVIRONMENT
        // =====================================================================
        async function loadEnvironment() {
            const data = await api.get(`/api/environments/${envId}`);
            if (!data) return;
            envData = data;
            titleInput.value = data.name;
            document.title = `${data.name} - Jupyter Redux`;
            badgesEl.innerHTML = `
                <span class="card-badge python">Python ${data.python_version || '3.11'}</span>
                ${data.gpu ? '<span class="card-badge gpu">GPU</span>' : ''}
            `;
            if (data.container_state) updateContainerBadge(data.container_state.status);
            const notebooks = data.notebooks || [];
            renderNotebooks(notebooks);
            if (data.container_state && data.container_state.status === 'ready') {
                loadRepos();
            }

            // Auto-open first notebook if none are open yet
            if (notebooks.length > 0 && openTabs.size === 0) {
                openNotebookTab(notebooks[0].id, notebooks[0].name);
            }
        }

        function updateContainerBadge(status, message) {
            containerBadge.className = `container-badge ${status}`;
            const text = containerBadge.querySelector('.badge-text');
            const labels = {
                none:'No container', building:message||'Building...', starting:'Starting...',
                ready:'Running', stopping:'Stopping...', stopped:'Stopped', error:message||'Error',
            };
            text.textContent = labels[status] || status;
        }

        // =====================================================================
        //  SIDEBAR: NOTEBOOKS
        // =====================================================================
        function renderNotebooks(notebooks) {
            notebookList.innerHTML = '';
            if (notebooks.length === 0) {
                notebookList.innerHTML = '<div class="file-tree-empty" style="padding:12px;">No notebooks</div>';
                return;
            }
            notebooks
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .forEach(nb => {
                    const key = 'nb:' + nb.id;
                    const el = document.createElement('div');
                    el.className = 'file-entry' + (activeTabKey === key ? ' active' : '');
                    el.innerHTML = `
                        <span class="file-icon">&#128211;</span>
                        <span class="file-name">${escapeHtml(nb.name)}</span>
                        <div class="file-entry-actions">
                            <button class="delete-btn" title="Delete">&#10005;</button>
                        </div>
                    `;
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.delete-btn')) {
                            e.stopPropagation();
                            deleteNotebook(nb.id, nb.name);
                            return;
                        }
                        openNotebookTab(nb.id, nb.name);
                    });
                    notebookList.appendChild(el);
                });
        }

        async function deleteNotebook(id, name) {
            if (!confirm(`Delete "${name}"?`)) return;
            const key = 'nb:' + id;
            if (openTabs.has(key)) closeTab(key);
            await api.del(`/api/notebooks/${id}`);
            loadEnvironment();
        }

        // =====================================================================
        //  SIDEBAR: SHARED TREES (Datasets + Artifacts)
        // =====================================================================
        // Read-only browsers rooted at /shared/datasets and /shared/artifacts.
        // Users don't edit files through these — they're for awareness of
        // what's available. Directory-level collapse state is per-tree so
        // Datasets and Artifacts don't clobber each other.
        const _sharedCollapsedDirs = {
            datasets: new Set(),
            artifacts: new Set(),
        };

        function formatSize(b) {
            if (b < 1024) return b + 'B';
            if (b < 1048576) return (b / 1024).toFixed(1) + 'K';
            if (b < 1073741824) return (b / 1048576).toFixed(1) + 'M';
            return (b / 1073741824).toFixed(1) + 'G';
        }

        async function loadSharedTree(root) {
            const container = root === 'datasets' ? datasetsTree : artifactsTree;
            const data = await api.get(`/api/shared/${root}`);
            const entries = (data && data.entries) || [];
            renderSharedTree(container, root, entries);
        }

        function renderSharedTree(container, root, entries) {
            container.querySelectorAll('.file-entry').forEach(el => el.remove());
            const empty = container.querySelector('.file-tree-empty');
            if (entries.length === 0) {
                if (empty) empty.style.display = 'block';
                return;
            }
            if (empty) empty.style.display = 'none';

            // Sort into tree order (dirs first, then alphabetical).
            const byParent = new Map();
            for (const e of entries) {
                const parent = e.path.includes('/') ? e.path.substring(0, e.path.lastIndexOf('/')) : '';
                if (!byParent.has(parent)) byParent.set(parent, []);
                byParent.get(parent).push(e);
            }
            for (const group of byParent.values()) {
                group.sort((a, b) => {
                    if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
                    return a.name.localeCompare(b.name);
                });
            }
            const ordered = [];
            function walkTree(parentPath) {
                const children = byParent.get(parentPath);
                if (!children) return;
                for (const child of children) {
                    ordered.push(child);
                    if (child.type === 'directory') walkTree(child.path);
                }
            }
            walkTree('');

            const collapsedSet = _sharedCollapsedDirs[root];
            const allEntries = ordered;
            for (const entry of allEntries) {
                let hidden = false;
                if (entry.path.includes('/')) {
                    const parts = entry.path.split('/');
                    for (let i = 1; i < parts.length; i++) {
                        const ancestor = parts.slice(0, i).join('/');
                        if (collapsedSet.has(ancestor)) { hidden = true; break; }
                    }
                }

                const el = document.createElement('div');
                el.className = `file-entry ${entry.type === 'directory' ? 'directory' : ''}`;
                if (hidden) el.style.display = 'none';

                const depth = entry.path.split('/').length - 1;
                const isDir = entry.type === 'directory';
                const collapsed = collapsedSet.has(entry.path);
                const chevron = isDir ? (collapsed ? '&#9654;' : '&#9660;') : '';
                const icon = isDir ? '&#128193;' : '&#128196;';
                const sizeStr = entry.size != null ? formatSize(entry.size) : '';
                el.innerHTML = `
                    <span class="dir-chevron" style="margin-left:${depth * 12}px;width:10px;font-size:0.5rem;flex-shrink:0;text-align:center;">${chevron}</span>
                    <span class="file-icon">${icon}</span>
                    <span class="file-name">${escapeHtml(entry.name)}</span>
                    <span class="file-size">${sizeStr}</span>
                `;
                if (isDir) {
                    el.addEventListener('click', () => {
                        if (collapsedSet.has(entry.path)) collapsedSet.delete(entry.path);
                        else collapsedSet.add(entry.path);
                        renderSharedTree(container, root, entries);
                    });
                }
                container.appendChild(el);
            }
        }

        function refreshSharedTrees() {
            loadSharedTree('datasets');
            loadSharedTree('artifacts');
        }

        // =====================================================================
        //  SHARED PATH COMPLETION (for CodeMirror, inside string literals)
        // =====================================================================
        // Cache the /api/shared/{root} tree once per tab session. Invalidated
        // when the user clicks Refresh on a section or when a cell emits a
        // `created_dirs` WS event (which means artifacts may have grown).
        const _sharedPathCache = { datasets: null, artifacts: null };

        function invalidateSharedPathCache(root) {
            if (root) _sharedPathCache[root] = null;
            else {
                _sharedPathCache.datasets = null;
                _sharedPathCache.artifacts = null;
            }
        }

        async function getSharedPathTree(root) {
            if (_sharedPathCache[root] !== null) return _sharedPathCache[root];
            try {
                const data = await api.get(`/api/shared/${root}`);
                _sharedPathCache[root] = (data && data.entries) || [];
            } catch {
                _sharedPathCache[root] = [];
            }
            return _sharedPathCache[root];
        }

        // CodeMirror CompletionSource: triggers inside string literals whose
        // content starts with /shared/datasets/ or /shared/artifacts/. Returns
        // null to pass through to other completion sources when out of scope.
        async function sharedPathCompletion(context) {
            const line = context.state.doc.lineAt(context.pos);
            const before = line.text.slice(0, context.pos - line.from);

            // Scan backward for the last unescaped quote on the same line.
            let quoteIdx = -1;
            for (let i = before.length - 1; i >= 0; i--) {
                const ch = before[i];
                if ((ch === '"' || ch === "'") && (i === 0 || before[i - 1] !== '\\')) {
                    quoteIdx = i;
                    break;
                }
            }
            if (quoteIdx === -1) return null;

            // Make sure the string hasn't already been closed before the cursor.
            const quoteChar = before[quoteIdx];
            for (let i = quoteIdx + 1; i < before.length; i++) {
                if (before[i] === quoteChar && before[i - 1] !== '\\') return null;
            }

            const content = before.slice(quoteIdx + 1);
            let root = null;
            let prefix = null;
            if (content.startsWith('/shared/datasets/')) {
                root = 'datasets';
                prefix = '/shared/datasets/';
            } else if (content.startsWith('/shared/artifacts/')) {
                root = 'artifacts';
                prefix = '/shared/artifacts/';
            } else {
                return null;
            }

            const entries = await getSharedPathTree(root);
            if (!entries || entries.length === 0) return null;

            // Split the relative path into (directory, partial-name).
            const relPath = content.slice(prefix.length);
            const lastSlash = relPath.lastIndexOf('/');
            const dirPart = lastSlash >= 0 ? relPath.slice(0, lastSlash) : '';
            const namePart = lastSlash >= 0 ? relPath.slice(lastSlash + 1) : relPath;
            const nameLower = namePart.toLowerCase();

            // Collect direct children of dirPart whose names start with namePart.
            const options = [];
            for (const e of entries) {
                const parent = e.path.includes('/')
                    ? e.path.substring(0, e.path.lastIndexOf('/'))
                    : '';
                if (parent !== dirPart) continue;
                if (!e.name.toLowerCase().startsWith(nameLower)) continue;

                const isDir = e.type === 'directory';
                options.push({
                    label: e.name + (isDir ? '/' : ''),
                    apply: e.name + (isDir ? '/' : ''),
                    type: isDir ? 'folder' : 'file',
                    boost: isDir ? 1 : 0,
                    detail: !isDir && e.size != null ? formatSize(e.size) : undefined,
                });
            }

            if (options.length === 0) return null;
            return {
                from: context.pos - namePart.length,
                options,
                validFor: /^[\w.\-]*$/,
            };
        }

        // Section header toggle: click header to expand/collapse the tree.
        // Default state is collapsed (see HTML's initial `collapsed` class).
        document.querySelectorAll('.shared-header').forEach(header => {
            header.addEventListener('click', (e) => {
                // Don't toggle when clicking the refresh button
                if (e.target.closest('.btn-refresh-shared')) return;
                const targetId = header.dataset.target;
                const target = document.getElementById(targetId);
                const collapsed = header.classList.toggle('collapsed');
                header.querySelector('.section-chevron').innerHTML = collapsed ? '&#9654;' : '&#9660;';
                target.style.display = collapsed ? 'none' : 'block';
                if (!collapsed) {
                    // Lazy-load on first expand so fresh contents appear
                    const root = targetId === 'datasets-tree' ? 'datasets' : 'artifacts';
                    loadSharedTree(root);
                }
            });
        });

        // Per-section refresh button
        document.querySelectorAll('.btn-refresh-shared').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                invalidateSharedPathCache(btn.dataset.root);
                loadSharedTree(btn.dataset.root);
            });
        });

        // =====================================================================
        //  SIDEBAR: REPOS
        // =====================================================================
        async function loadRepos() {
            const data = await api.get(`/api/environments/${envId}/repos`);
            if (!data || !data.repos) { repoListEmpty.style.display = 'block'; return; }
            renderRepos(data.repos);
        }

        function renderRepos(repos) {
            repoList.querySelectorAll('.file-entry').forEach(el => el.remove());
            if (repos.length === 0) { repoListEmpty.style.display = 'block'; return; }
            repoListEmpty.style.display = 'none';
            for (const repo of repos) {
                const el = document.createElement('div');
                el.className = 'file-entry directory';
                const badges = repo.installable ? '<span style="font-size:0.65rem;color:var(--accent-green);margin-left:4px;">installable</span>' : '';
                el.innerHTML = `
                    <span class="file-icon">&#128230;</span>
                    <span class="file-name">${escapeHtml(repo.name)}${badges}</span>
                    <div class="file-entry-actions">
                        <button class="pull-btn" title="Pull latest">&#8595;</button>
                        ${repo.installable ? '<button class="install-btn" title="pip install -e">Install</button>' : ''}
                        <button class="delete-btn" title="Remove">&#10005;</button>
                    </div>
                `;
                el.querySelector('.pull-btn').addEventListener('click', (e) => { e.stopPropagation(); doPullRepo(repo.name); });
                if (el.querySelector('.install-btn')) el.querySelector('.install-btn').addEventListener('click', (e) => { e.stopPropagation(); doInstallRepo(repo.name); });
                el.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); deleteRepo(repo.name); });
                // Restore spinner if this repo is currently installing
                if (_installingRepos.has(repo.name)) {
                    el.classList.add('installing');
                    const sp = document.createElement('span');
                    sp.className = 'repo-spinner';
                    el.appendChild(sp);
                }
                repoList.appendChild(el);
            }
        }

        async function deleteRepo(name) { if (!confirm(`Remove repo "${name}"?`)) return; await api.del(`/api/environments/${envId}/repos/${encodeURIComponent(name)}`); loadRepos(); }

        // =====================================================================
        //  TAB SYSTEM
        // =====================================================================
        function tabLabel(key) {
            const tab = openTabs.get(key);
            if (!tab) return key;
            if (tab.type === 'notebook') return tab.name;
            return key.split('/').pop();
        }

        function renderTabsBar() {
            tabsBar.innerHTML = '';
            for (const [key, tab] of openTabs) {
                const el = document.createElement('div');
                const modified = tab.type === 'file' && tab.modified;
                el.className = `editor-tab ${key===activeTabKey?'active':''} ${modified?'modified':''}`;
                const icon = tab.type === 'notebook' ? '&#128211; ' : '';
                el.innerHTML = `
                    <span class="tab-name">${icon}${escapeHtml(tabLabel(key))}</span>
                    <button class="tab-close" title="Close">&times;</button>
                `;
                el.querySelector('.tab-name').addEventListener('click', () => { switchTab(key); });
                el.querySelector('.tab-close').addEventListener('click', (e) => { e.stopPropagation(); closeTab(key); });
                tabsBar.appendChild(el);
            }
        }

        function switchTab(key) {
            activeTabKey = key;
            renderTabsBar();
            renderActiveTab();
            updateSidebarSelection();
        }

        function closeTab(key) {
            const tab = openTabs.get(key);
            if (!tab) return;
            if (tab.type === 'file') {
                if (tab.modified && !confirm(`"${key}" has unsaved changes. Close?`)) return;
                if (tab.editor) tab.editor.destroy();
            }
            if (tab.type === 'notebook' && tab.ws) {
                tab.ws.disconnect();
            }
            if (tab.container) tab.container.remove();
            openTabs.delete(key);
            if (activeTabKey === key) {
                const remaining = [...openTabs.keys()];
                activeTabKey = remaining.length > 0 ? remaining[remaining.length - 1] : null;
            }
            renderTabsBar();
            renderActiveTab();
            updateSidebarSelection();
        }

        function updateSidebarSelection() {
            notebookList.querySelectorAll('.file-entry').forEach(el => el.classList.remove('active'));
        }

        function renderActiveTab() {
            // Hide all tab containers
            editorArea.querySelectorAll('.tab-content').forEach(el => { el.style.display = 'none'; });

            if (!activeTabKey || !openTabs.has(activeTabKey)) {
                editorPlaceholder.style.display = 'flex';
                statusPath.textContent = '';
                statusSave.textContent = '';
                return;
            }
            editorPlaceholder.style.display = 'none';

            const tab = openTabs.get(activeTabKey);
            if (tab.type === 'file') renderFileTabContent(activeTabKey, tab);
            else if (tab.type === 'notebook') renderNotebookTabContent(activeTabKey, tab);
        }

        // =====================================================================
        //  FILE TABS
        // =====================================================================
        async function openFileTab(path) {
            if (!openTabs.has(path)) {
                const data = await api.get(`/api/environments/${envId}/files/read?path=${encodeURIComponent(path)}`);
                if (!data) return;
                openTabs.set(path, { type:'file', content:data.content, savedContent:data.content, editor:null, modified:false, container:null });
            }
            switchTab(path);
            statusPath.textContent = path;
        }

        function renderFileTabContent(key, tab) {
            statusPath.textContent = key;
            statusSave.textContent = '';

            if (tab.container) {
                tab.container.style.display = 'flex';
                return;
            }

            if (!window.EditorView) {
                window.addEventListener('codemirror-ready', () => renderFileTabContent(key, tab), { once: true });
                return;
            }

            const isPython = key.endsWith('.py');
            const wrap = document.createElement('div');
            wrap.className = 'tab-content';
            wrap.style.display = 'flex';
            wrap.style.flex = '1';
            wrap.style.minHeight = '0';

            const extensions = [
                lineNumbers(), highlightActiveLine(), highlightActiveLineGutter(),
                EditorView.lineWrapping,
                syntaxHighlighting(defaultHighlightStyle, { fallback:true }), oneDark,
                keymap.of([
                    { key:'Mod-s', run:() => { saveFile(key); return true; } },
                    ...completionKeymap,
                    ...defaultKeymap,
                ]),
                ...(isPython ? [python(), autocompletion()] : []),
                EditorView.updateListener.of((update) => {
                    if (update.docChanged) {
                        tab.content = update.state.doc.toString();
                        tab.modified = tab.content !== tab.savedContent;
                        renderTabsBar();
                        scheduleSave(key);
                    }
                }),
            ];

            const editor = new EditorView({
                state: EditorState.create({ doc: tab.content, extensions }),
                parent: wrap,
            });
            tab.editor = editor;
            tab.container = wrap;
            editorArea.appendChild(wrap);
        }

        let _saveTimers = {};
        function scheduleSave(key) { clearTimeout(_saveTimers[key]); _saveTimers[key] = setTimeout(() => saveFile(key), 1000); }

        async function saveFile(key) {
            const tab = openTabs.get(key);
            if (!tab || tab.type !== 'file') return;
            statusSave.textContent = 'Saving...';
            const result = await api.put(`/api/environments/${envId}/files/write`, { path:key, content:tab.content });
            if (result) {
                tab.savedContent = tab.content; tab.modified = false;
                statusSave.textContent = 'Saved'; renderTabsBar();
                setTimeout(() => { if (statusSave.textContent === 'Saved') statusSave.textContent = ''; }, 2000);
            } else { statusSave.textContent = 'Save failed'; }
        }

        // =====================================================================
        //  NOTEBOOK TABS
        // =====================================================================
        async function openNotebookTab(nbId, name) {
            const key = 'nb:' + nbId;
            if (!openTabs.has(key)) {
                const data = await api.get(`/api/notebooks/${nbId}`);
                if (!data) return;
                openTabs.set(key, {
                    type: 'notebook', id: nbId, name: data.name,
                    data: data, container: null, ws: null,
                    cells: new Map(), cellOrder: [], execCounts: {},
                });
            }
            switchTab(key);
            statusPath.textContent = name || '';
        }

        function renderNotebookTabContent(key, tab) {
            statusPath.textContent = tab.name;
            statusSave.textContent = '';

            if (tab.container) {
                tab.container.style.display = 'flex';
                return;
            }

            const wrap = document.createElement('div');
            wrap.className = 'tab-content notebook-embed';
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';
            wrap.style.flex = '1';
            wrap.style.minHeight = '0';

            // Toolbar
            const toolbar = document.createElement('div');
            toolbar.className = 'nb-toolbar';
            toolbar.innerHTML = `
                <button class="btn btn-small nb-add-code">+ Code</button>
                <button class="btn btn-small nb-run-all">Run All</button>
                <button class="btn btn-small btn-stop nb-interrupt" style="display:none;">Stop</button>
                <button class="btn btn-small btn-force-stop nb-force-stop" style="display:none;" title="Kill the kernel — loses all notebook namespace">Force Stop</button>
                <div class="toolbar-spacer"></div>
                <span class="nb-save-status" style="font-size:0.8rem;color:var(--text-muted);"></span>
            `;
            wrap.appendChild(toolbar);

            // Cells container — styling (flex, overflow, padding) is
            // handled by the .cells-container CSS class.
            const cellsDiv = document.createElement('div');
            cellsDiv.className = 'cells-container';
            wrap.appendChild(cellsDiv);

            tab.container = wrap;
            tab.cellsDiv = cellsDiv;
            tab.toolbar = toolbar;
            editorArea.appendChild(wrap);

            // Render existing cells
            for (const cellData of (tab.data.cells || [])) {
                addCellToTab(tab, cellData);
            }

            // Connect WebSocket
            connectNotebookWs(tab);

            // Toolbar handlers
            toolbar.querySelector('.nb-add-code').addEventListener('click', () => addNewCell(tab));
            toolbar.querySelector('.nb-run-all').addEventListener('click', () => runAllCells(tab));
            toolbar.querySelector('.nb-interrupt').addEventListener('click', () => {
                if (tab.ws) tab.ws.interrupt(tab._runningCellId || '');
            });
            toolbar.querySelector('.nb-force-stop').addEventListener('click', () => {
                if (tab.ws) tab.ws.forceStop(tab._runningCellId || '');
                hideForceStopButton(tab);
            });
        }

        function addCellToTab(tab, cellData) {
            if (!window.EditorView) {
                window.addEventListener('codemirror-ready', () => addCellToTab(tab, cellData), { once: true });
                return;
            }

            const cellId = cellData.id;
            const el = document.createElement('div');
            el.className = 'cell';
            el.dataset.cellId = cellId;

            // Header
            const header = document.createElement('div');
            header.className = 'cell-header';
            header.innerHTML = `
                <span class="cell-exec-count">In [ ]:</span>
                <span class="cell-type-badge">code</span>
                <div class="cell-toolbar">
                    <button class="btn-icon run-btn" title="Run (Shift+Enter)">&#9654;</button>
                    <button class="btn-icon del-btn" title="Delete">&#10005;</button>
                </div>
            `;
            el.appendChild(header);

            // Editor
            const editorWrap = document.createElement('div');
            editorWrap.className = 'cell-editor';
            el.appendChild(editorWrap);

            // Output wrapper has two zones: pinned (always visible, for
            // custom views like the training monitor / audio displays) and
            // the collapsible log (stdout/stderr/result/error).
            const outputWrap = document.createElement('div');
            outputWrap.className = 'cell-output-wrapper collapsed';
            outputWrap.style.display = 'none';

            const pinnedEl = document.createElement('div');
            pinnedEl.className = 'cell-output-pinned';

            const outputToggle = document.createElement('button');
            outputToggle.className = 'output-toggle';
            outputToggle.setAttribute('aria-label', 'Toggle output log');

            const outputEl = document.createElement('div');
            outputEl.className = 'cell-output';

            outputWrap.appendChild(pinnedEl);
            outputWrap.appendChild(outputToggle);
            outputWrap.appendChild(outputEl);
            el.appendChild(outputWrap);

            tab.cellsDiv.appendChild(el);

            // CodeMirror for cell
            const extensions = [
                lineNumbers(), highlightActiveLine(), highlightActiveLineGutter(),
                EditorView.lineWrapping,
                syntaxHighlighting(defaultHighlightStyle, { fallback:true }), oneDark,
                keymap.of([
                    { key:'Shift-Enter', run:() => { executeCell(tab, cellId); return true; } },
                    { key:'Ctrl-Enter', run:() => { executeCell(tab, cellId); return true; } },
                    { key:'Tab', run: acceptCompletion },
                    ...completionKeymap,
                    ...defaultKeymap,
                ]),
                python(),
                // /shared/{datasets,artifacts}/* path completion inside
                // string literals — registered via Python language data so
                // it composes with the default completion sources.
                window.pythonLanguage.data.of({ autocomplete: sharedPathCompletion }),
                autocompletion(),
                EditorView.updateListener.of((update) => {
                    if (update.docChanged) scheduleCellSave(tab, cellId, update.state.doc.toString());
                }),
            ];

            const editor = new EditorView({
                state: EditorState.create({ doc: cellData.source || '', extensions }),
                parent: editorWrap,
            });

            const cellInfo = { id: cellId, el, editor, outputEl, pinnedEl, outputWrap, outputToggle, execCountEl: header.querySelector('.cell-exec-count'), monitors: {} };

            outputToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                outputWrap.classList.toggle('collapsed');
                updateOutputToggle(cellInfo);
            });
            tab.cells.set(cellId, cellInfo);
            tab.cellOrder.push(cellId);

            // Render existing outputs
            if (cellData.outputs && cellData.outputs.length > 0) {
                for (const out of cellData.outputs) appendCellOutput(cellInfo, out.output_type, out.content);
            }
            if (cellData.execution_count != null) {
                cellInfo.execCountEl.textContent = `In [${cellData.execution_count}]:`;
            }

            // Restore the visual execution state from persistence. This
            // matters on browser reload: if a cell is still running, the
            // WS replay from exec_manager will re-send the running state
            // message, but we don't want a flash of "no state" while we
            // wait for that message — and if the backend restarted and
            // lost the in-flight record, at least the persisted state
            // is accurate enough to drive the UI.
            const state = cellData.execution_state;
            if (state === 'running') {
                el.className = 'cell running';
                cellInfo.execCountEl.textContent = 'In [*]:';
                cellInfo.execCountEl.className = 'cell-exec-count running';
                tab._runningCellId = cellId;
                const interruptBtn = tab.toolbar.querySelector('.nb-interrupt');
                if (interruptBtn) interruptBtn.style.display = 'inline-flex';
            } else if (state === 'completed') {
                el.className = 'cell completed';
            } else if (state === 'errored') {
                el.className = 'cell errored';
            }

            // Button handlers
            header.querySelector('.run-btn').addEventListener('click', () => executeCell(tab, cellId));
            header.querySelector('.del-btn').addEventListener('click', () => deleteCellFromTab(tab, cellId));
        }

        async function addNewCell(tab) {
            const result = await api.post(`/api/notebooks/${tab.id}/cells`, { cell_type:'code', source:'' });
            if (!result || !result.cells) return;
            const newCellData = result.cells[result.cells.length - 1];
            addCellToTab(tab, newCellData);
        }

        async function deleteCellFromTab(tab, cellId) {
            const cell = tab.cells.get(cellId);
            if (!cell) return;
            await api.del(`/api/notebooks/${tab.id}/cells/${cellId}`);
            cell.editor.destroy();
            cell.el.remove();
            tab.cells.delete(cellId);
            tab.cellOrder = tab.cellOrder.filter(id => id !== cellId);
        }

        let _cellSaveTimers = {};
        function scheduleCellSave(tab, cellId, source) {
            const k = tab.id + ':' + cellId;
            clearTimeout(_cellSaveTimers[k]);
            _cellSaveTimers[k] = setTimeout(() => {
                api.put(`/api/notebooks/${tab.id}/cells/${cellId}`, { source });
            }, 800);
        }

        // =====================================================================
        //  NOTEBOOK EXECUTION (WebSocket)
        // =====================================================================
        const buildLogOverlay = document.getElementById('build-log-overlay');
        const buildLogEl = document.getElementById('build-log');
        const buildLogTitle = buildLogEl.querySelector('.build-log-title');
        const buildLogContent = document.getElementById('build-log-content');
        const buildLogClose = document.getElementById('build-log-close');
        let _buildActive = false;

        function setBuildLogVisible(visible) {
            buildLogOverlay.classList.toggle('visible', visible);
        }

        function startBuildLog(title) {
            _buildActive = true;
            buildLogTitle.textContent = title || 'Building container image...';
            buildLogContent.textContent = '';
            containerBadge.classList.add('clickable');
        }

        function endBuildLog() {
            _buildActive = false;
            containerBadge.classList.remove('clickable');
            setBuildLogVisible(false);
        }

        function appendBuildLog(text) {
            if (typeof text === 'string') {
                buildLogContent.textContent += text + '\n';
            } else {
                for (const line of text) {
                    buildLogContent.textContent += line + '\n';
                }
            }
            buildLogContent.scrollTop = buildLogContent.scrollHeight;
        }

        // Click badge to toggle build log overlay
        containerBadge.addEventListener('click', () => {
            if (!_buildActive) return;
            setBuildLogVisible(!buildLogOverlay.classList.contains('visible'));
        });

        // Close button inside overlay
        buildLogClose.addEventListener('click', () => {
            setBuildLogVisible(false);
        });

        // Click backdrop to dismiss
        buildLogOverlay.addEventListener('click', (e) => {
            if (e.target === buildLogOverlay) setBuildLogVisible(false);
        });

        // =====================================================================
        //  RESOURCE MONITOR (sidebar bars)
        // =====================================================================
        const resourceMonitorEl = document.getElementById('resource-monitor');
        const resourceBars = {
            cpu: resourceMonitorEl.querySelector('[data-metric="cpu"]'),
            mem: resourceMonitorEl.querySelector('[data-metric="mem"]'),
            gpu: resourceMonitorEl.querySelector('[data-metric="gpu"]'),
        };
        let _lastResourceAt = 0;

        function formatBytes(n) {
            if (!n) return '0';
            const units = ['B', 'K', 'M', 'G', 'T'];
            let i = 0;
            let v = n;
            while (v >= 1024 && i < units.length - 1) {
                v /= 1024;
                i++;
            }
            return (v >= 10 ? Math.round(v) : v.toFixed(1)) + units[i];
        }

        function setBar(bar, fillPct, readout, title) {
            if (!bar) return;
            const clamped = Math.max(0, Math.min(100, fillPct));
            bar.querySelector('.rb-fill').style.width = clamped + '%';
            bar.querySelector('.rb-readout').textContent = readout;
            if (title) bar.title = title;
            bar.classList.remove('stale');
        }

        function dimBar(bar) {
            if (!bar) return;
            bar.classList.add('stale');
        }

        function updateResourceBars(msg) {
            _lastResourceAt = Date.now();

            const container = msg.container;
            if (container) {
                setBar(
                    resourceBars.cpu,
                    container.cpu_pct || 0,
                    (container.cpu_pct || 0).toFixed(0) + '%',
                    `Host CPU: ${(container.cpu_pct || 0).toFixed(1)}% across all cores`,
                );
                const memUsed = container.mem_used || 0;
                const memTotal = container.mem_total || 0;
                const memPct = memTotal ? (memUsed / memTotal) * 100 : 0;
                setBar(
                    resourceBars.mem,
                    memPct,
                    formatBytes(memUsed),
                    `Host memory: ${formatBytes(memUsed)} / ${formatBytes(memTotal)} used`,
                );
            } else {
                dimBar(resourceBars.cpu);
                dimBar(resourceBars.mem);
            }

            const gpu = msg.gpu;
            if (gpu) {
                // Discrete GPUs report memory; unified-memory devices
                // (e.g. Grace Blackwell / GB10) don't have a separate
                // VRAM pool, so only utilization is meaningful.
                if (gpu.mem_total && gpu.mem_used != null) {
                    const gpuPct = (gpu.mem_used / gpu.mem_total) * 100;
                    setBar(
                        resourceBars.gpu,
                        gpuPct,
                        formatBytes(gpu.mem_used),
                        `GPU memory: ${formatBytes(gpu.mem_used)} / ${formatBytes(gpu.mem_total)}` +
                        ` (util ${gpu.util_pct || 0}%)`,
                    );
                } else {
                    // Fall back to utilization as the bar fill.
                    const util = gpu.util_pct || 0;
                    setBar(
                        resourceBars.gpu,
                        util,
                        util + '%',
                        `GPU utilization: ${util}% (unified memory — see MEM bar for allocation)`,
                    );
                }
            } else {
                dimBar(resourceBars.gpu);
                resourceBars.gpu.querySelector('.rb-readout').textContent = 'n/a';
            }
        }

        // If no stats have arrived for >5s, fade the bars to indicate staleness.
        setInterval(() => {
            if (_lastResourceAt === 0) return;
            if (Date.now() - _lastResourceAt > 5000) {
                for (const bar of Object.values(resourceBars)) dimBar(bar);
            }
        }, 1000);

        // =====================================================================
        //  FORCE STOP ESCALATION
        // =====================================================================
        // After a cell enters the "stopping" state, if it's still not
        // finished FORCE_STOP_DELAY_MS later we surface the Force Stop
        // button in the notebook toolbar. The user is expected to have
        // already decided Interrupt isn't working.
        const FORCE_STOP_DELAY_MS = 3000;

        function scheduleForceStopButton(tab, cellId) {
            clearForceStopTimer(tab);
            tab._forceStopTimer = setTimeout(() => {
                tab._forceStopTimer = null;
                // Only show if the cell is still stopping.
                if (tab._runningCellId !== cellId) return;
                const btn = tab.toolbar.querySelector('.nb-force-stop');
                if (btn) btn.style.display = 'inline-flex';
            }, FORCE_STOP_DELAY_MS);
        }

        function clearForceStopTimer(tab) {
            if (tab._forceStopTimer) {
                clearTimeout(tab._forceStopTimer);
                tab._forceStopTimer = null;
            }
        }

        function hideForceStopButton(tab) {
            clearForceStopTimer(tab);
            const btn = tab.toolbar && tab.toolbar.querySelector('.nb-force-stop');
            if (btn) btn.style.display = 'none';
        }

        function connectNotebookWs(tab) {
            const ws = new NotebookWebSocket(tab.id);

            ws.on('container_state', (msg) => {
                updateContainerBadge(msg.status, msg.message);
                if (msg.status === 'building') {
                    startBuildLog('Building container image...');
                } else if (msg.status === 'starting') {
                    startBuildLog('Starting container...');
                    if (msg.message) appendBuildLog(msg.message);
                } else if (msg.status === 'ready') {
                    appendBuildLog('Container ready.');
                    setTimeout(() => endBuildLog(), 1000);
                    loadRepos();
                } else if (msg.status === 'error') {
                    appendBuildLog('Error: ' + (msg.message || 'unknown'));
                    // Keep overlay accessible on error so user can see what went wrong
                }
            });

            ws.on('build_log', (msg) => {
                appendBuildLog(msg.lines || []);
            });

            ws.on('state', (msg) => {
                const cell = tab.cells.get(msg.cell_id);
                if (!cell) return;
                if (msg.execution_state === 'running') {
                    // Fresh execution (or reconnect replay): clear stale outputs.
                    cell.outputEl.innerHTML = '';
                    cell.pinnedEl.innerHTML = '';
                    cell.monitors = {};
                    cell._streamState = null;
                    cell.outputWrap.style.display = 'none';
                    cell.outputWrap.classList.add('collapsed');
                    cell.execCountEl.textContent = 'In [*]:';
                    cell.execCountEl.className = 'cell-exec-count running';
                    cell.el.className = 'cell running';
                    clearForceStopTimer(tab);
                    tab._runningCellId = msg.cell_id;
                    tab.toolbar.querySelector('.nb-interrupt').style.display = 'inline-flex';
                } else if (msg.execution_state === 'stopping') {
                    cell.el.classList.add('stopping');
                    cell.execCountEl.textContent = 'In [!]:';
                    cell.execCountEl.className = 'cell-exec-count stopping';
                    scheduleForceStopButton(tab, msg.cell_id);
                } else {
                    if (msg.execution_count != null) cell.execCountEl.textContent = `In [${msg.execution_count}]:`;
                    cell.execCountEl.className = 'cell-exec-count';
                    cell.el.className = msg.execution_state === 'errored' ? 'cell errored' : 'cell completed';
                    clearForceStopTimer(tab);
                    if (tab._runningCellId === msg.cell_id) {
                        tab._runningCellId = null;
                        tab.toolbar.querySelector('.nb-interrupt').style.display = 'none';
                        hideForceStopButton(tab);
                    }
                }
            });

            ws.on('output', (msg) => {
                const cell = tab.cells.get(msg.cell_id);
                if (cell) appendCellOutput(cell, msg.stream, msg.text);
            });

            ws.on('result', (msg) => {
                const cell = tab.cells.get(msg.cell_id);
                if (cell) appendCellOutput(cell, 'result', msg.data);
            });

            ws.on('display', (msg) => {
                const cell = tab.cells.get(msg.cell_id);
                if (cell) appendCellDisplay(cell, msg);
            });

            ws.on('created_dirs', (msg) => {
                if (msg.dirs && msg.dirs.length) {
                    // Cell wrote to /env/repos or /env/files. Refresh
                    // repos, and refresh artifacts since /shared/artifacts
                    // may also have grown.
                    loadRepos();
                    invalidateSharedPathCache('artifacts');
                    loadSharedTree('artifacts');
                }
            });

            ws.on('error', (msg) => {
                const cell = tab.cells.get(msg.cell_id);
                if (cell) {
                    const div = document.createElement('div');
                    div.className = 'output-error';
                    div.innerHTML = `<span class="error-name">${escapeHtml(msg.ename)}: ${escapeHtml(msg.evalue)}</span>`;
                    if (msg.traceback && msg.traceback.length) {
                        const pre = document.createElement('pre');
                        pre.className = 'traceback';
                        pre.textContent = msg.traceback.join('\n');
                        div.appendChild(pre);
                    }
                    cell.outputEl.appendChild(div);
                    showCellOutput(cell);
                }
            });

            ws.on('resource_stats', (msg) => {
                updateResourceBars(msg);
            });

            tab.ws = ws;
            ws.connect();
        }

        function logHasContent(cell) {
            return cell.outputEl.children.length > 0 || cell.outputEl.textContent.trim().length > 0;
        }

        function pinnedHasContent(cell) {
            return cell.pinnedEl.children.length > 0;
        }

        function updateOutputToggle(cell) {
            const hasLog = logHasContent(cell);
            // Hide the toggle and log entirely when there's nothing in the
            // log — monitor-only cells shouldn't show a dangling "0 lines".
            cell.outputToggle.style.display = hasLog ? '' : 'none';
            cell.outputEl.style.display = hasLog ? '' : 'none';
            if (!hasLog) return;

            const collapsed = cell.outputWrap.classList.contains('collapsed');
            const lines = (cell.outputEl.textContent || '').split('\n').filter(l => l.trim()).length;
            if (collapsed) {
                cell.outputToggle.innerHTML = `<span class="toggle-icon">&#9654;</span> Output <span class="toggle-hint">${lines} line${lines !== 1 ? 's' : ''} — click to expand</span>`;
            } else {
                cell.outputToggle.innerHTML = `<span class="toggle-icon">&#9660;</span> Output <span class="toggle-hint">click to collapse</span>`;
            }
        }

        function showCellOutput(cell) {
            if (logHasContent(cell) || pinnedHasContent(cell)) {
                cell.outputWrap.style.display = 'block';
                updateOutputToggle(cell);
            }
        }

        // Mini terminal state machine for cell output streams.
        //
        // tqdm and other libraries don't just use \r — when multiple bars
        // are active (or leaked into tqdm._instances from earlier bars),
        // they emit a multi-line refresh pattern: \n -> \r<bar> -> \x1b[A
        // (newline down, write bar, cursor back up). Interpreting this
        // correctly needs cursor tracking, not just \r handling.
        //
        // The state is a 2D "screen" buffer (array of line strings, cursor
        // row+col). We honor \r \n \b and a subset of CSI sequences:
        //   \x1b[nA  cursor up n (default 1)
        //   \x1b[nB  cursor down n
        //   \x1b[nC  cursor forward n
        //   \x1b[nD  cursor back n
        //   \x1b[K   erase in line (0=to end, 1=to start, 2=whole line)
        // All other CSI sequences (colors, etc) are stripped.
        const CSI_RE = /\x1b\[([\d;?]*)([a-zA-Z])/;

        function newStreamState() {
            return { lines: [''], row: 0, col: 0, el: null };
        }

        function ensureRow(state, row) {
            while (state.lines.length <= row) state.lines.push('');
        }

        function writeCharAt(state, ch) {
            ensureRow(state, state.row);
            let line = state.lines[state.row];
            if (state.col < line.length) {
                state.lines[state.row] =
                    line.slice(0, state.col) + ch + line.slice(state.col + 1);
            } else {
                // Pad with spaces if the cursor jumped past end-of-line.
                state.lines[state.row] =
                    line + ' '.repeat(state.col - line.length) + ch;
            }
            state.col++;
        }

        function handleCsi(state, params, final) {
            const n = parseInt(params, 10);
            const count = isNaN(n) ? 1 : Math.max(1, n);
            switch (final) {
                case 'A':
                    state.row = Math.max(0, state.row - count);
                    break;
                case 'B':
                    state.row += count;
                    ensureRow(state, state.row);
                    break;
                case 'C':
                    state.col += count;
                    break;
                case 'D':
                    state.col = Math.max(0, state.col - count);
                    break;
                case 'K': {
                    const mode = isNaN(n) ? 0 : n;
                    ensureRow(state, state.row);
                    const line = state.lines[state.row];
                    if (mode === 0) {
                        state.lines[state.row] = line.slice(0, state.col);
                    } else if (mode === 1) {
                        state.lines[state.row] =
                            ' '.repeat(state.col) + line.slice(state.col);
                    } else if (mode === 2) {
                        state.lines[state.row] = '';
                    }
                    break;
                }
                // All other CSI sequences (colors, cursor positioning,
                // SGR, show/hide cursor, etc) are intentionally ignored.
            }
        }

        function processStreamChunk(state, text) {
            // Normalize CRLF so \r doesn't spuriously wipe just-committed lines.
            text = text.replace(/\r\n/g, '\n');

            let i = 0;
            while (i < text.length) {
                const ch = text[i];
                if (ch === '\x1b' && text[i + 1] === '[') {
                    const m = text.slice(i).match(CSI_RE);
                    if (m) {
                        handleCsi(state, m[1], m[2]);
                        i += m[0].length;
                        continue;
                    }
                    // Incomplete CSI sequence at chunk tail — skip the ESC
                    // and continue. (Chunks are always full JSON messages,
                    // so partial-at-boundary is vanishingly rare.)
                    i++;
                    continue;
                }

                if (ch === '\n') {
                    state.row++;
                    state.col = 0;
                    ensureRow(state, state.row);
                } else if (ch === '\r') {
                    state.col = 0;
                } else if (ch === '\b') {
                    if (state.col > 0) state.col--;
                } else if (ch === '\x1b') {
                    // Bare ESC not followed by [ — skip it.
                } else {
                    writeCharAt(state, ch);
                }
                i++;
            }
        }

        function renderStreamState(state) {
            // Trim leading blank lines — tqdm's \n \r<bar> \x1b[A pattern
            // leaves row 0 empty as a phantom "space above the bar".
            return state.lines.join('\n').replace(/^\n+/, '');
        }

        function appendCellOutput(cell, type, content) {
            if (!content) return;

            // 'result' and 'error' are structured one-shots, not incremental
            // line streams — bypass the state machine entirely.
            if (type === 'result' || type === 'error') {
                const pre = document.createElement('pre');
                pre.className = `output-${type}`;
                pre.textContent = content;
                cell.outputEl.appendChild(pre);
                showCellOutput(cell);
                return;
            }

            // Per-stream state lives on the cell so it survives across
            // interleaves where a different stream's <pre> becomes the
            // last child (e.g. stdout print() in the middle of a tqdm bar).
            if (!cell._streamState) {
                cell._streamState = {
                    stdout: newStreamState(),
                    stderr: newStreamState(),
                };
            }
            const state = cell._streamState[type];
            if (!state) {
                // Unknown stream type — fall back to plain append.
                const pre = document.createElement('pre');
                pre.className = `output-${type}`;
                pre.textContent = content;
                cell.outputEl.appendChild(pre);
                showCellOutput(cell);
                return;
            }

            // If another stream has taken over the log's last child, the
            // in-progress screen on our stream is no longer live. Freeze
            // it into its <pre> and start a fresh screen — the next
            // write will create a new <pre>.
            const last = cell.outputEl.lastElementChild;
            if (state.el && state.el !== last) {
                state.el.textContent = renderStreamState(state);
                cell._streamState[type] = newStreamState();
            }

            const active = cell._streamState[type];
            processStreamChunk(active, content);

            if (!active.el) {
                active.el = document.createElement('pre');
                active.el.className = `output-${type}`;
                cell.outputEl.appendChild(active.el);
            }
            active.el.textContent = renderStreamState(active);

            showCellOutput(cell);
        }

        function appendCellDisplay(cell, msg) {
            const dt = msg.display_type;
            if (dt === 'monitor') {
                handleMonitorMessage(cell, msg);
                return;
            }
            if (dt === 'audio' && msg.data) {
                const bytes = Uint8Array.from(atob(msg.data), c => c.charCodeAt(0));
                const blob = new Blob([bytes], { type: msg.mime });
                const url = URL.createObjectURL(blob);

                const wrapper = document.createElement('div');
                wrapper.className = 'output-display output-audio';

                const label = document.createElement('span');
                label.className = 'audio-filename';
                label.textContent = msg.filename || 'audio';
                wrapper.appendChild(label);

                const audio = document.createElement('audio');
                audio.controls = true;
                audio.preload = 'metadata';
                audio.src = url;
                wrapper.appendChild(audio);

                cell.pinnedEl.appendChild(wrapper);
            }
            showCellOutput(cell);
        }

        // --- Monitor rendering ---
        const MONITOR_COLORS = ['#7aa2f7','#9ece6a','#e0af68','#bb9af7','#7dcfff','#f7768e'];

        function handleMonitorMessage(cell, msg) {
            const did = msg.display_id;
            const action = msg.action;

            if (action === 'init') {
                const container = document.createElement('div');
                container.className = 'output-display output-monitor';

                const title = document.createElement('div');
                title.className = 'monitor-title';
                title.textContent = (msg.config && msg.config.title) || 'Monitor';
                container.appendChild(title);

                // Canvas is hidden until the first data point arrives to
                // avoid an oversized empty chart area while training is
                // still warming up (data loaders, etc.). A compact
                // placeholder hints at what we're waiting for.
                const placeholder = document.createElement('div');
                placeholder.className = 'monitor-placeholder';
                placeholder.textContent = 'Waiting for first step...';
                container.appendChild(placeholder);

                const canvas = document.createElement('canvas');
                canvas.className = 'monitor-canvas';
                canvas.height = 200;
                canvas.style.display = 'none';
                container.appendChild(canvas);

                const legend = document.createElement('div');
                legend.className = 'monitor-legend';
                container.appendChild(legend);

                const table = document.createElement('div');
                table.className = 'monitor-metrics';
                container.appendChild(table);

                let progressEl = null;
                if (msg.config && msg.config.total_steps) {
                    progressEl = document.createElement('div');
                    progressEl.className = 'monitor-progress';
                    progressEl.innerHTML = '<div class="monitor-progress-track"><div class="monitor-progress-bar"></div></div><span class="monitor-progress-text"></span>';
                    container.appendChild(progressEl);
                }

                cell.pinnedEl.appendChild(container);
                showCellOutput(cell);

                cell.monitors[did] = {
                    container, canvas, ctx: canvas.getContext('2d'),
                    placeholder, legend, table, progressEl,
                    series: {}, keyOrder: [],
                    config: msg.config || {}, lastStep: 0,
                };
            }
            else if (action === 'update') {
                const mon = cell.monitors[did];
                if (!mon) return;
                const step = msg.step;
                const metrics = msg.metrics || {};

                // First real data point: reveal the canvas, drop the
                // "waiting" placeholder. From here on draws handle sizing.
                if (mon.placeholder) {
                    mon.placeholder.remove();
                    mon.placeholder = null;
                    mon.canvas.style.display = '';
                }

                for (const [key, value] of Object.entries(metrics)) {
                    if (!mon.series[key]) {
                        mon.series[key] = [];
                        mon.keyOrder.push(key);
                    }
                    mon.series[key].push({ step, value });
                }
                mon.lastStep = step;

                drawMonitorChart(mon);
                updateMonitorTable(mon, metrics, step);

                if (mon.progressEl && mon.config.total_steps) {
                    const pct = Math.min(100, ((step + 1) / mon.config.total_steps) * 100);
                    mon.progressEl.querySelector('.monitor-progress-bar').style.width = pct + '%';
                    mon.progressEl.querySelector('.monitor-progress-text').textContent =
                        `${step + 1} / ${mon.config.total_steps} (${pct.toFixed(1)}%)`;
                }
                showCellOutput(cell);
            }
            else if (action === 'done') {
                const mon = cell.monitors[did];
                if (mon) mon.container.classList.add('monitor-done');
            }
        }

        function drawMonitorChart(mon) {
            const { canvas, ctx, series, keyOrder, container } = mon;
            const dpr = window.devicePixelRatio || 1;
            // Size canvas to container width on every draw
            const cw = Math.max(300, container.clientWidth - 24);
            canvas.width = cw * dpr;
            canvas.height = 200 * dpr;
            canvas.style.width = cw + 'px';
            canvas.style.height = '200px';
            const W = canvas.width, H = canvas.height;
            const pad = { top: 10*dpr, right: 15*dpr, bottom: 30*dpr, left: 55*dpr };
            const plotW = W - pad.left - pad.right;
            const plotH = H - pad.top - pad.bottom;

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#16171f';
            ctx.fillRect(0, 0, W, H);

            if (keyOrder.length === 0) return;

            let xMin = Infinity, xMax = -Infinity;
            let yMin = Infinity, yMax = -Infinity;
            for (const key of keyOrder) {
                for (const pt of series[key]) {
                    if (pt.step < xMin) xMin = pt.step;
                    if (pt.step > xMax) xMax = pt.step;
                    if (pt.value < yMin) yMin = pt.value;
                    if (pt.value > yMax) yMax = pt.value;
                }
            }
            if (xMin === xMax) xMax = xMin + 1;
            if (yMin === yMax) { yMin -= 0.5; yMax += 0.5; }
            const yPad = (yMax - yMin) * 0.05;
            yMin -= yPad; yMax += yPad;

            const xS = (v) => pad.left + ((v - xMin) / (xMax - xMin)) * plotW;
            const yS = (v) => pad.top + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

            // Grid
            ctx.strokeStyle = '#2f3347';
            ctx.lineWidth = 0.5 * dpr;
            const yTicks = 5;
            const fs = 10 * dpr;
            ctx.font = `${fs}px monospace`;
            for (let i = 0; i <= yTicks; i++) {
                const y = pad.top + (plotH / yTicks) * i;
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
                const val = yMax - ((yMax - yMin) / yTicks) * i;
                ctx.fillStyle = '#565f89';
                ctx.textAlign = 'right';
                ctx.fillText(fmtAxis(val), pad.left - 5*dpr, y + 3*dpr);
            }
            ctx.textAlign = 'center';
            const xTicks = Math.min(6, Math.max(1, xMax - xMin));
            for (let i = 0; i <= xTicks; i++) {
                const step = Math.round(xMin + ((xMax - xMin) / xTicks) * i);
                ctx.fillStyle = '#565f89';
                ctx.fillText(step, xS(step), H - pad.bottom + 15*dpr);
            }

            // Series lines
            for (let ki = 0; ki < keyOrder.length; ki++) {
                const pts = series[keyOrder[ki]];
                if (pts.length === 0) continue;
                ctx.strokeStyle = MONITOR_COLORS[ki % MONITOR_COLORS.length];
                ctx.lineWidth = 1.5 * dpr;
                ctx.beginPath();
                ctx.moveTo(xS(pts[0].step), yS(pts[0].value));
                for (let i = 1; i < pts.length; i++) {
                    ctx.lineTo(xS(pts[i].step), yS(pts[i].value));
                }
                ctx.stroke();
            }

            // Legend
            mon.legend.innerHTML = '';
            for (let i = 0; i < keyOrder.length; i++) {
                const item = document.createElement('span');
                item.className = 'monitor-legend-item';
                item.innerHTML = `<span class="legend-swatch" style="background:${MONITOR_COLORS[i % MONITOR_COLORS.length]}"></span>${escapeHtml(keyOrder[i])}`;
                mon.legend.appendChild(item);
            }
        }

        function fmtAxis(v) {
            if (Math.abs(v) >= 1000) return v.toExponential(1);
            if (Math.abs(v) < 0.001 && v !== 0) return v.toExponential(1);
            return Number(v.toPrecision(3)).toString();
        }

        function updateMonitorTable(mon, metrics, step) {
            mon.table.innerHTML = '';
            const add = (k, v) => {
                const row = document.createElement('div');
                row.className = 'monitor-metrics-row';
                row.innerHTML = `<span class="metric-key">${escapeHtml(k)}</span><span class="metric-val">${v}</span>`;
                mon.table.appendChild(row);
            };
            add('step', step);
            for (const [k, v] of Object.entries(metrics)) {
                add(k, typeof v === 'number' ? Number(v.toPrecision(4)) : v);
            }
        }

        function executeCell(tab, cellId) {
            if (!tab.ws) return;
            const cell = tab.cells.get(cellId);
            if (!cell) return;
            cell.outputEl.innerHTML = '';
            cell.monitors = {};
            cell.outputWrap.style.display = 'none';
            cell.outputWrap.classList.add('collapsed');
            const source = cell.editor.state.doc.toString();
            tab.ws.execute(cellId, source);
        }

        async function runAllCells(tab) {
            for (const cellId of tab.cellOrder) {
                const cell = tab.cells.get(cellId);
                if (!cell) continue;
                cell.outputEl.innerHTML = '';
                cell.outputWrap.style.display = 'none';
                const source = cell.editor.state.doc.toString();
                tab.ws.execute(cellId, source);
                // Wait for completion
                await new Promise(resolve => {
                    const handler = (msg) => {
                        if (msg.cell_id === cellId && (msg.execution_state === 'completed' || msg.execution_state === 'errored')) {
                            tab.ws.off('state', handler);
                            resolve();
                        }
                    };
                    tab.ws.on('state', handler);
                });
            }
        }

        // =====================================================================
        //  CLONE / INSTALL (streams into build-log overlay with repo spinner)
        // =====================================================================
        function setRepoInstalling(name, installing) {
            if (installing) _installingRepos.add(name);
            else _installingRepos.delete(name);
            // Find the repo entry in the sidebar and toggle spinner
            for (const el of repoList.querySelectorAll('.file-entry')) {
                const nameEl = el.querySelector('.file-name');
                if (!nameEl) continue;
                // Compare just the repo name (text before any badge spans)
                const repoText = nameEl.childNodes[0]?.textContent?.trim();
                if (repoText !== name) continue;
                el.classList.toggle('installing', installing);
                if (installing && !el.querySelector('.repo-spinner')) {
                    const sp = document.createElement('span');
                    sp.className = 'repo-spinner';
                    el.appendChild(sp);
                } else if (!installing) {
                    const sp = el.querySelector('.repo-spinner');
                    if (sp) sp.remove();
                }
                break;
            }
        }

        async function streamInstall(name) {
            setRepoInstalling(name, true);
            buildLogTitle.textContent = `Installing ${name}...`;
            buildLogContent.textContent = '';
